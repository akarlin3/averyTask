name: Auto-merge

# Enables GitHub's built-in auto-merge on pull requests targeting main.
# Once enabled, GitHub will merge the PR automatically after all required
# status checks pass and required reviews (if any) are satisfied.
#
# Requirements (one-time repo setup in Settings → General):
#   - "Allow auto-merge" must be enabled.
#   - Branch protection on `main` should list the CI checks that must pass
#     before a merge is allowed (otherwise auto-merge falls back to merging
#     as soon as a review/required-check is satisfied).

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    # Skip drafts and forks (GITHUB_TOKEN can't enable auto-merge on forks).
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          # Ignore errors if auto-merge is already enabled or the branch
          # is already in a mergeable state and gets merged immediately.
          gh pr merge --auto --squash "$PR_URL" || \
            echo "Auto-merge could not be enabled (already enabled, already merged, or repo setting disabled)."
