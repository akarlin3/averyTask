name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'

  test:
    needs: changes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: averytask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/averytask_test
      JWT_SECRET_KEY: test-secret-key
      ENVIRONMENT: dev

    steps:
      - name: Skip (no relevant changes)
        if: needs.changes.outputs.relevant != 'true'
        working-directory: .
        run: echo "No backend or workflow changes detected; reporting success without running tests."

      - uses: actions/checkout@v4
        if: needs.changes.outputs.relevant == 'true'

      - name: Set up Python 3.11
        if: needs.changes.outputs.relevant == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: needs.changes.outputs.relevant == 'true'
        run: pip install -r requirements.txt

      - name: Lint with ruff
        if: needs.changes.outputs.relevant == 'true'
        run: ruff check app/ tests/

      - name: Run Alembic migrations
        if: needs.changes.outputs.relevant == 'true'
        run: alembic upgrade head

      - name: Run tests
        if: needs.changes.outputs.relevant == 'true'
        run: pytest tests/ -x --tb=short -q
