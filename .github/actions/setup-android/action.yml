name: Setup Android Build
description: JDK 21 and Gradle setup for Android builds (repo must already be checked out)

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: temurin

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant gradlew execute permission
      shell: bash
      run: chmod +x gradlew
